<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#020404">
  <link rel="manifest" href="./assets/manifest.json">
  <link rel="icon" type="image/svg+xml" href="./assets/icons/favicon.svg">
  <title>dtslib-localpc | DTSLIB Infra</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#020404;font-family:system-ui,-apple-system,sans-serif;color:#F8FAF9}
    #vp{position:fixed;inset:0;overflow:hidden;touch-action:none}
    #canvas{position:absolute;width:0;height:0;transform-origin:0 0}
    #edges{position:absolute;overflow:visible;pointer-events:none}

    /* ── NODES ── */
    .node{position:absolute;left:0;top:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border-radius:14px;cursor:pointer;will-change:transform;touch-action:none;-webkit-user-select:none;user-select:none}
    .node.hub{width:160px;height:80px;background:linear-gradient(135deg,#1a1200,#2a1f00);border:2px solid #D4AF37;box-shadow:0 0 24px rgba(212,175,55,.4),0 0 48px rgba(212,175,55,.12)}
    .node.regular{width:148px;height:72px;background:#0d1a2a;border:1px solid rgba(96,165,250,.45);box-shadow:0 0 12px rgba(96,165,250,.15)}
    .node.stat{width:96px;height:48px;background:#0a1210;border:1px solid rgba(248,250,249,.12)}
    .node.link{width:130px;height:40px;background:rgba(212,175,55,.07);border:1px solid rgba(212,175,55,.3)}
    .node.active{filter:brightness(1.3);z-index:100}
    .node-label{font-size:12px;font-weight:700;line-height:1.3;white-space:pre-line;pointer-events:none}
    .node.hub .node-label{font-size:14px;color:#D4AF37}
    .node.regular .node-label{color:#93c5fd}
    .node.stat .node-label{font-size:10px;color:rgba(248,250,249,.6)}
    .node.link .node-label{font-size:11px;color:#D4AF37}
    .node.hub::after{content:'';position:absolute;inset:-8px;border-radius:20px;border:1px solid rgba(212,175,55,.25);animation:pulse 3s ease-in-out infinite;pointer-events:none}
    @keyframes pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.7;transform:scale(1.04)}}

    /* ── HUD ── */
    #hud{position:fixed;top:16px;left:16px;z-index:20;pointer-events:none;display:flex;flex-direction:column;gap:4px}
    .hud-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.08em;background:rgba(96,165,250,.15);color:#60A5FA;border:1px solid rgba(96,165,250,.3)}
    .hud-title{font-size:18px;font-weight:700}
    .hud-sub{font-size:11px;color:rgba(248,250,249,.5)}

    /* ── BUTTONS ── */
    .topbtn{position:fixed;z-index:20;padding:7px 14px;border-radius:8px;border:1px solid rgba(248,250,249,.15);background:rgba(13,20,16,.85);backdrop-filter:blur(8px);color:rgba(248,250,249,.7);font-size:12px;cursor:pointer;top:16px}
    .topbtn:hover{background:rgba(212,175,55,.15);color:#D4AF37;border-color:rgba(212,175,55,.4)}
    #btn-fit{right:16px}
    #btn-heat{right:90px}

    /* ── INFO PANEL ── */
    #info{position:fixed;bottom:0;left:0;right:0;z-index:30;background:#0d1410;border-top:1px solid rgba(248,250,249,.07);padding:20px 24px 32px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:55vh;overflow-y:auto}
    #info.open{transform:translateY(0)}
    #info-close{position:absolute;top:14px;right:18px;background:none;border:none;color:rgba(248,250,249,.4);font-size:22px;cursor:pointer;line-height:1}
    #info-close:hover{color:#F8FAF9}
    #info-title{font-size:15px;font-weight:700;color:#D4AF37;margin-bottom:8px}
    #info-body{font-size:13px;color:rgba(248,250,249,.7);line-height:1.65}
    #info-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
    .tag{padding:3px 9px;border-radius:12px;font-size:10px;font-weight:600;background:rgba(96,165,250,.12);color:#60A5FA;border:1px solid rgba(96,165,250,.25)}
    #info-link{display:none;margin-top:14px;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;background:rgba(212,175,55,.12);color:#D4AF37;border:1px solid rgba(212,175,55,.35);text-decoration:none}
    #info-link:hover{background:rgba(212,175,55,.22)}

    /* ── HINT ── */
    #hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);backdrop-filter:blur(6px);border:1px solid rgba(248,250,249,.1);border-radius:20px;padding:6px 16px;font-size:11px;color:rgba(248,250,249,.55);pointer-events:none;transition:opacity .6s;z-index:20;white-space:nowrap}
    #hint.hidden{opacity:0}
  </style>
</head>
<body>

<div id="hud">
  <span class="hud-badge">INFRA · LOCAL PC</span>
  <div class="hud-title">dtslib-localpc</div>
  <div class="hud-sub">Home PC Remote Control Tower</div>
</div>

<button class="topbtn" id="btn-heat" title="Shake">⚡</button>
<button class="topbtn" id="btn-fit"  title="Fit all">⊡ Fit</button>

<div id="vp">
  <div id="canvas">
    <svg id="edges"></svg>
  </div>
</div>

<div id="info">
  <button id="info-close">×</button>
  <div id="info-title"></div>
  <div id="info-body"></div>
  <div id="info-tags"></div>
  <a id="info-link" href="#" target="_blank" rel="noopener">Open →</a>
</div>

<div id="hint">Drag nodes · Pinch zoom · Tap to open</div>

<script>
/* ══════════════════════════════════════════════
   MAP DATA
══════════════════════════════════════════════ */
const MAP = {
  nodes:[
    {id:"hub",    type:"hub",     label:"DTSLIB\nLocal PC",       title:"DTSLIB Local PC — Infra Tower",      body:"On-premises PC running 24/7 via WSL2. Remote-controlled from anywhere via Tailscale SSH + tmux. Nerve center for all 28 repos. Claude Code runs here as the main driver.",         tags:["INFRA","WSL2","PC-MAIN","TMUX"]},
    {id:"auto",   type:"regular", label:"Local\nAutomation",       title:"Local Automation",                   body:"Batch scripts and automation tools running natively on the PC. Playwright headless=false for browser automation (Kakao, Google, Tistory). CLI pipelines via SSH sessions.",        tags:["AUTOMATION","PLAYWRIGHT","BATCH","CLI"]},
    {id:"exp",    type:"regular", label:"Experimental\nCode",      title:"Experimental Code",                  body:"Local-only prototypes and DTSLIB ecosystem experiments. No cloud dependencies. Offline-first workflow. Ideas land here before graduating to production repos.",                    tags:["PROTOTYPE","OFFLINE","EXPERIMENT"]},
    {id:"infra",  type:"regular", label:"Infrastructure\nBridge",  title:"Infrastructure Bridge",              body:"Termux-bridge (mobile) ↔ dtslib-localpc (PC) bidirectional link. Snapshot scripts auto-capture installed tools and repo states. Cross-session bootstrap via repos/status.json.", tags:["SSH","TAILSCALE","SNAPSHOT","BOOTSTRAP"]},
    {id:"stat1",  type:"stat",    label:"On-Premises",             title:"On-Premises First",                  body:"Home PC stays on 24/7. No cloud bill. All compute, storage and execution happen locally. Cloud is a last resort.",                                                               tags:["ONPREM","PC"]},
    {id:"stat2",  type:"stat",    label:"CLI Batch",               title:"CLI Batch Execution",                body:"tmux sessions run long jobs autonomously. Telegram bot sends results to phone. Fire and forget workflow.",                                                                        tags:["TMUX","TELEGRAM"]},
    {id:"stat3",  type:"stat",    label:"28 Repos",                title:"28 GitHub Repos",                    body:"dtslib-localpc acts as the control tower for all 28 repositories. One Claude Code session, full coverage.",                                                                     tags:["GITHUB","MONOREPO"]},
    {id:"github", type:"link",    label:"GitHub →",                title:"GitHub — dtslib-localpc",            body:"Source repository on GitHub. Snapshots, hooks, scripts, and cross-repo status logs all live here.",                                                                             tags:["GITHUB"], href:"https://github.com/dtslib1979/dtslib-localpc"},
  ],
  edges:[
    {from:"hub",  to:"auto",   color:"#D4AF37"},
    {from:"hub",  to:"exp",    color:"#D4AF37"},
    {from:"hub",  to:"infra",  color:"#D4AF37"},
    {from:"hub",  to:"stat1",  color:"#60A5FA"},
    {from:"hub",  to:"stat2",  color:"#60A5FA"},
    {from:"infra",to:"stat3",  color:"#60A5FA"},
    {from:"infra",to:"github", color:"#D4AF37"},
    {from:"auto", to:"stat1",  color:"rgba(96,165,250,.35)"},
    {from:"exp",  to:"stat2",  color:"rgba(96,165,250,.35)"},
  ]
};

/* ══════════════════════════════════════════════
   ENGINE
══════════════════════════════════════════════ */
function nodeW(t){return{hub:160,regular:148,stat:96,link:130}[t]||120}
function nodeH(t){return{hub:80, regular:72, stat:48,link:40 }[t]||60}

const vp=document.getElementById('vp');
const canvas=document.getElementById('canvas');
const svgEl=document.getElementById('edges');
const info=document.getElementById('info');
const infoTitle=document.getElementById('info-title');
const infoBody=document.getElementById('info-body');
const infoTags=document.getElementById('info-tags');
const infoLink=document.getElementById('info-link');

let tx=0,ty=0,sc=1;
function applyVP(){canvas.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`}

/* ── Simulation nodes ── */
const SN=MAP.nodes.map((n,i)=>{
  const total=MAP.nodes.length;
  const angle=(i/total)*Math.PI*2-Math.PI/2;
  const r=n.id==='hub'?0:200+Math.random()*60;
  return{id:n.id,x:Math.cos(angle)*r+(Math.random()-.5)*30,y:Math.sin(angle)*r+(Math.random()-.5)*30,vx:0,vy:0,pinned:false,data:n,W:nodeW(n.type),H:nodeH(n.type)};
});
SN.find(n=>n.id==='hub').pinned=true; // hub fixed at origin

/* ── Build node divs ── */
MAP.nodes.forEach(n=>{
  const s=SN.find(s=>s.id===n.id);
  const el=document.createElement('div');
  el.className=`node ${n.type}`;
  el.style.width=s.W+'px'; el.style.height=s.H+'px';
  el.innerHTML=`<span class="node-label">${n.label}</span>`;
  canvas.appendChild(el);
  n._el=el;

  // Pointer drag + tap
  let sx,sy,moved,captureId;
  el.addEventListener('pointerdown',e=>{
    e.stopPropagation();
    el.setPointerCapture(e.pointerId);
    captureId=e.pointerId;
    sx=e.clientX; sy=e.clientY; moved=false;
    s.pinned=true; s.vx=0; s.vy=0;
    el.classList.add('active');
  },{passive:true});
  el.addEventListener('pointermove',e=>{
    if(e.pointerId!==captureId)return;
    if(Math.hypot(e.clientX-sx,e.clientY-sy)>8){
      moved=true;
      s.x=(e.clientX-tx)/sc;
      s.y=(e.clientY-ty)/sc;
      s.vx=0; s.vy=0;
      alpha=Math.min(alpha+0.15,0.6);
    }
  },{passive:true});
  el.addEventListener('pointerup',e=>{
    if(e.pointerId!==captureId)return;
    el.releasePointerCapture(e.pointerId);
    el.classList.remove('active');
    s.pinned=(n.id==='hub');
    if(!moved) openInfo(n);
  },{passive:true});
  el.addEventListener('pointercancel',e=>{
    el.classList.remove('active');
    s.pinned=(n.id==='hub');
  },{passive:true});
});

/* ── Build SVG edges ── */
const dots=[];
MAP.edges.forEach(edge=>{
  const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
  ln.setAttribute('stroke',edge.color);
  ln.setAttribute('stroke-width','1.5');
  ln.setAttribute('stroke-opacity','0.55');
  svgEl.appendChild(ln);
  edge._ln=ln;

  const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
  dot.setAttribute('r','3');
  dot.setAttribute('fill',edge.color);
  dot.setAttribute('fill-opacity','0.9');
  svgEl.appendChild(dot);
  dots.push({edge,dot,t:Math.random(),spd:0.003+Math.random()*0.003});
});

/* ── Force simulation ── */
let alpha=1;
const REP=18000, LDIST=230, LSTR=0.05, CGRAV=0.01, VDEC=0.45, ADEC=0.018;

function tick(){
  if(alpha<0.001)return;
  alpha*=(1-ADEC);
  const a=alpha;
  // Repulsion
  for(let i=0;i<SN.length;i++) for(let j=i+1;j<SN.length;j++){
    const A=SN[i],B=SN[j];
    const dx=(B.x-A.x)||.01, dy=(B.y-A.y)||.01;
    const d2=dx*dx+dy*dy, d=Math.sqrt(d2);
    const f=REP/d2*a;
    A.vx-=dx/d*f; A.vy-=dy/d*f;
    B.vx+=dx/d*f; B.vy+=dy/d*f;
  }
  // Springs
  MAP.edges.forEach(e=>{
    const A=SN.find(n=>n.id===e.from), B=SN.find(n=>n.id===e.to);
    if(!A||!B)return;
    const dx=B.x-A.x, dy=B.y-A.y;
    const d=Math.sqrt(dx*dx+dy*dy)||1;
    const f=(d-LDIST)*LSTR*a;
    A.vx+=dx/d*f; A.vy+=dy/d*f;
    B.vx-=dx/d*f; B.vy-=dy/d*f;
  });
  // Gravity toward origin
  SN.forEach(N=>{N.vx-=N.x*CGRAV*a; N.vy-=N.y*CGRAV*a;});
  // Integrate
  SN.forEach(N=>{
    if(N.pinned)return;
    N.vx*=VDEC; N.vy*=VDEC;
    N.x+=N.vx; N.y+=N.vy;
  });
}

/* ── Render loop ── */
function render(){
  tick();
  // Nodes
  SN.forEach(N=>{ N.data._el.style.transform=`translate(${N.x-N.W/2}px,${N.y-N.H/2}px)`; });
  // Edges
  MAP.edges.forEach(e=>{
    if(!e._ln)return;
    const A=SN.find(n=>n.id===e.from), B=SN.find(n=>n.id===e.to);
    if(!A||!B)return;
    e._ln.setAttribute('x1',A.x); e._ln.setAttribute('y1',A.y);
    e._ln.setAttribute('x2',B.x); e._ln.setAttribute('y2',B.y);
  });
  // Dots
  dots.forEach(d=>{
    d.t=(d.t+d.spd)%1;
    const A=SN.find(n=>n.id===d.edge.from), B=SN.find(n=>n.id===d.edge.to);
    if(!A||!B)return;
    d.dot.setAttribute('cx',A.x+(B.x-A.x)*d.t);
    d.dot.setAttribute('cy',A.y+(B.y-A.y)*d.t);
  });
  requestAnimationFrame(render);
}
render();

/* ── Fit all ── */
function fitAll(){
  let mnx=Infinity,mny=Infinity,mxx=-Infinity,mxy=-Infinity;
  SN.forEach(N=>{mnx=Math.min(mnx,N.x-N.W/2);mny=Math.min(mny,N.y-N.H/2);mxx=Math.max(mxx,N.x+N.W/2);mxy=Math.max(mxy,N.y+N.H/2);});
  const pad=60,vpW=vp.clientWidth,vpH=vp.clientHeight;
  const mw=mxx-mnx||1, mh=mxy-mny||1;
  sc=Math.min((vpW-pad*2)/mw,(vpH-pad*2)/mh,1.3);
  tx=vpW/2-(mnx+mw/2)*sc; ty=vpH/2-(mny+mh/2)*sc;
  applyVP();
}
setTimeout(fitAll,200); // wait for first sim frames
window.addEventListener('resize',fitAll);
document.getElementById('btn-fit').addEventListener('click',fitAll);

/* ── Reheat ── */
document.getElementById('btn-heat').addEventListener('click',()=>{
  alpha=1;
  SN.forEach(N=>{if(!N.pinned){N.vx=(Math.random()-.5)*20;N.vy=(Math.random()-.5)*20;}});
});

/* ── Canvas pan / pinch (pointer events) ── */
const ptrs=new Map();
let panRef=null, pinchRef=null;

vp.addEventListener('pointerdown',e=>{
  if(e.target.closest('.node'))return;
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===1) panRef={tx,ty,x:e.clientX,y:e.clientY};
  else if(ptrs.size===2){
    panRef=null;
    const pts=[...ptrs.values()];
    pinchRef={dist:Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y),sc,tx,ty,cx:(pts[0].x+pts[1].x)/2,cy:(pts[0].y+pts[1].y)/2};
  }
},{passive:true});

vp.addEventListener('pointermove',e=>{
  if(!ptrs.has(e.pointerId))return;
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===1&&panRef){
    tx=panRef.tx+(e.clientX-panRef.x);
    ty=panRef.ty+(e.clientY-panRef.y);
    applyVP();
  } else if(ptrs.size===2&&pinchRef){
    const pts=[...ptrs.values()];
    const dist=Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y);
    const ns=Math.min(Math.max(pinchRef.sc*(dist/pinchRef.dist),.15),4);
    tx=pinchRef.cx-(pinchRef.cx-pinchRef.tx)*(ns/pinchRef.sc);
    ty=pinchRef.cy-(pinchRef.cy-pinchRef.ty)*(ns/pinchRef.sc);
    sc=ns; applyVP();
  }
},{passive:true});

['pointerup','pointercancel'].forEach(ev=>vp.addEventListener(ev,e=>{
  ptrs.delete(e.pointerId);
  if(ptrs.size<2)pinchRef=null;
  if(ptrs.size===0)panRef=null;
},{passive:true}));

vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=vp.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  const f=e.deltaY<0?1.12:1/1.12, ns=Math.min(Math.max(sc*f,.15),4);
  tx=mx-(mx-tx)*(ns/sc); ty=my-(my-ty)*(ns/sc); sc=ns; applyVP();
},{passive:false});

/* ── Info panel ── */
function openInfo(n){
  infoTitle.textContent=n.title||n.label.replace('\n',' ');
  infoBody.textContent=n.body||'';
  infoTags.innerHTML=(n.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  if(n.href){infoLink.href=n.href;infoLink.style.display='inline-block';}
  else infoLink.style.display='none';
  info.classList.add('open');
}
document.getElementById('info-close').addEventListener('click',()=>info.classList.remove('open'));

/* ── Hint ── */
setTimeout(()=>document.getElementById('hint').classList.add('hidden'),4500);
</script>
</body>
</html>
